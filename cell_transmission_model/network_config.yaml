simulation:
  time_step: 3  
  total_time: 7200  

od_demand:
  - origin: "START"
    destination: "END"
    start_time: 0
    end_time: 3600
    rate: 4600  
  - origin: "START"
    destination: "OFF_RAMP_SINK"
    start_time: 0
    end_time: 1800
    rate: 500  
  - origin: "ON_RAMP_SOURCE"
    destination: "END"
    start_time: 0
    end_time: 3600
    rate: 900  

meter_schedule:
  - node: "ON_RAMP_METER"
    start_time: 900
    end_time: 3600
    rate: 840  
  
nodes:
  - id: "START"
    type: "source"
  - id: "NODE_OFF_RAMP"
    type: "diverge"
  - id: "NODE_ON_RAMP"
    type: "merge"
  - id: "END"
    type: "sink"
  - id: "OFF_RAMP_SINK"
    type: "sink"
  - id: "ON_RAMP_SOURCE"
    type: "source"
  - id: "ON_RAMP_METER"  
    type: "meter"

edges:
